regimes:
  under_saturated:
    memory_pressure: green
    swap_delta_mb: 0
    pressure_injection: none
    expected_policy: full_8
  saturation:
    memory_pressure: yellow
    swap_delta_mb: increasing
    pressure_injection: budget_only
    expected_policy: r75_b8_if_backend_supported_else_r50_b16
  contention:
    memory_pressure: yellow_or_red
    swap_delta_mb: increasing
    pressure_injection: memory_process
    expected_policy: adaptive_memory_first

