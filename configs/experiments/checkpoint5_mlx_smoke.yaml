experiment:
  name: checkpoint5_mlx_smoke
  model: models/Llama-3.2-1B-4bit
  backend: mlx
  quantization: 4bit_model

scenario:
  name: mlx_q8_runtime_smoke
  task_profile: document_qa
  prompt_tokens: [3072]
  regimes: [under_saturated]

generation:
  max_tokens: 1
  run_mlx: true

policy:
  profile: auto
  allow_simulated: false
  max_decision_overhead_fraction: 0.05
  dynamic_retention:
    enabled: true
    kv_bits: [8, 16]
    min_retention: 0.30
    budget_margin: 0.999
    replace_static_retention: true

memory:
  budget_ratio:
    under_saturated: 2.0
  min_under_saturated_headroom_mb: 256

regime_priors:
  under_saturated:
    memory_pressure: green
    pressure_injection: none
    swap_delta_mb: 0
    pageout_delta: 0
    swapout_delta: 0
    compressed_memory_delta_mb: 0
    latency_ms_per_token: 50
    latency_p95_ms_per_token: 52
    recent_latency_trend: 0

outputs:
  log: logs/adaptive_os/runtime_os_mlx_smoke.jsonl
  runtime_csv: reports/checkpoint-5/runtime_decisions_mlx_smoke.csv
  budget_csv: reports/checkpoint-5/budget_enforcement_mlx_smoke.csv
  cost_csv: reports/checkpoint-5/runtime_cost_terms_mlx_smoke.csv
  action_svg: reports/checkpoint-5/runtime_policy_actions_mlx_smoke.svg
  report: reports/checkpoint-5/report_mlx_smoke.md
