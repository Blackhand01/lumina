experiment:
  name: checkpoint6_regime_benchmark
  model: models/Llama-3.2-1B-4bit
  backend: mlx
  quantization: 4bit_model

benchmark:
  repeats: 1
  prompt_tokens: [3072, 10000]
  regimes: [under_saturated, saturation, contention]
  docqa_dataset: data/benchmark_sets/docqa_minimal.jsonl
  docqa_max_examples: 24
  scenarios:
    - name: needle
      task_profile: needle
      positions: [sink, early, middle, late]
    - name: document_qa
      task_profile: document_qa
      positions: [early, middle, late]
    - name: long_context
      task_profile: generic
      positions: [late]
    - name: multi_turn
      task_profile: retrieval
      positions: [early, middle, late]

generation:
  generated_tokens: 32
  run_mlx: false

methods:
  - name: Full KV
    action: full_16
    family: baseline
  - name: Quantized 8-bit
    action: full_8
    family: static_q8
  - name: Retention-only
    action: r50_b16
    family: retention
  - name: Hybrid conservative
    action: r75_b8
    family: hybrid_theoretical
    theoretical_only: true
  - name: Hybrid balanced
    action: r50_b8
    family: hybrid_theoretical
    theoretical_only: true
  - name: Hybrid aggressive
    action: r30_b4
    family: hybrid_theoretical
    theoretical_only: true
  - name: Ideal dynamic q8
    ideal_dynamic: true
    kv_bits: 8
    family: theoretical_upper_bound
    theoretical_only: true
  - name: Adaptive Lumina
    adaptive: true
    family: adaptive

policy:
  profile: auto
  allow_simulated: false
  max_decision_overhead_fraction: 0.05
  dynamic_retention:
    enabled: true
    kv_bits: [8, 16]
    min_retention: 0.30
    budget_margin: 0.999
    replace_static_retention: true

memory:
  budget_ratio:
    under_saturated: 2.0
    saturation: 0.515
    contention: 0.515
  min_under_saturated_headroom_mb: 256

retention:
  protected_window_tokens: 4

regime_priors:
  under_saturated:
    memory_pressure: green
    pressure_injection: none
    swap_delta_mb: 0
    pageout_delta: 0
    swapout_delta: 0
    compressed_memory_delta_mb: 0
    latency_ms_per_token: 50
    latency_p95_ms_per_token: 52
    recent_latency_trend: 0
  saturation:
    memory_pressure: yellow
    pressure_injection: budget_only
    swap_delta_mb: 48
    pageout_delta: 25
    swapout_delta: 0
    compressed_memory_delta_mb: 128
    latency_ms_per_token: 55
    latency_p95_ms_per_token: 72
    recent_latency_trend: 0.12
  contention:
    memory_pressure: yellow
    pressure_injection: memory_process
    swap_delta_mb: 96
    pageout_delta: 80
    swapout_delta: 12
    compressed_memory_delta_mb: 320
    latency_ms_per_token: 58
    latency_p95_ms_per_token: 110
    recent_latency_trend: 0.35

outputs:
  log: logs/benchmarks/checkpoint6_latest.jsonl
  scenario_csv: reports/checkpoint-6/scenario_results.csv
  regime_summary_csv: reports/checkpoint-6/regime_summary.csv
  policy_shift_csv: reports/checkpoint-6/policy_shift_summary.csv
  lost_intelligence_csv: reports/checkpoint-6/lost_intelligence.csv
  lost_intelligence_summary_csv: reports/checkpoint-6/lost_intelligence_summary.csv
  figures_dir: reports/checkpoint-6/figures
  report: reports/report-checkpoint-6.md
